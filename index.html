<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ---- custom scroll & chat bubbles ---- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #0d0d0d;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    #root {
      height: 100vh;
      display: flex;
      background: #0d0d0d;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #3b3b3b;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* message animations */
    .msg-enter {
      animation: fadeSlideUp 0.25s ease-out forwards;
    }
    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .typing-dot {
      animation: typingPulse 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes typingPulse {
      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      30% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    /* sidebar transition */
    .sidebar-transition {
      transition: transform 0.25s ease, width 0.25s ease;
    }
    @media (max-width: 768px) {
      .sidebar-mobile {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 50;
        width: 280px;
        transform: translateX(-100%);
      }
      .sidebar-mobile.open {
        transform: translateX(0);
      }
      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 40;
        display: none;
      }
      .sidebar-overlay.open {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
      }
    }
  </script>
  <script type="module">
    // -------------------------------------------------------------
    //  ENTRY: main.tsx  (inlined for single-file deployment)
    // -------------------------------------------------------------
    import React from 'react';
    import ReactDOM from 'react-dom/client';
    import { App } from './App';

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(React.StrictMode, null, React.createElement(App))
    );
  </script>

  <script type="module">
    // -------------------------------------------------------------
    //  App.tsx
    // -------------------------------------------------------------
    import React, { useState, useEffect, useRef, useCallback, useMemo } from 'react';
    import { useChat } from './hooks/useChat';
    import { SettingsModal } from './components/SettingsModal';
    import { StatusIndicator } from './components/StatusIndicator';
    import { ChatInput } from './components/ChatInput';
    import { MessageList } from './components/MessageList';
    import { Sidebar } from './components/Sidebar';

    export function App() {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [showClearConfirm, setShowClearConfirm] = useState(false);

      const {
        conversations,
        currentConversationId,
        currentMessages,
        isLoading,
        isConnected,
        settings,
        createNewChat,
        deleteConversation,
        switchConversation,
        sendMessage,
        clearCurrentChat,
        updateSettings,
        testConnection,
        getConversationTitle,
      } = useChat();

      // close sidebar on mobile after action
      const closeSidebar = () => setSidebarOpen(false);

      const handleNewChat = () => {
        createNewChat();
        closeSidebar();
      };

      const handleSwitchChat = (id) => {
        switchConversation(id);
        closeSidebar();
      };

      const handleDeleteChat = (id) => {
        deleteConversation(id);
        closeSidebar();
      };

      const handleClearChat = () => {
        if (currentMessages.length === 0) return;
        setShowClearConfirm(true);
      };

      const confirmClear = () => {
        clearCurrentChat();
        setShowClearConfirm(false);
      };

      return (
        <div className="flex h-screen w-screen bg-[#0d0d0d] text-gray-200 overflow-hidden">

          {/* ---- Overlay (mobile) ---- */}
          <div
            className={`sidebar-overlay ${sidebarOpen ? 'open' : ''}`}
            onClick={() => setSidebarOpen(false)}
          />

          {/* ---- Sidebar ---- */}
          <Sidebar
            conversations={conversations}
            currentId={currentConversationId}
            onNewChat={handleNewChat}
            onSwitchChat={handleSwitchChat}
            onDeleteChat={handleDeleteChat}
            onOpenSettings={() => setSettingsOpen(true)}
            isOpen={sidebarOpen}
            onClose={() => setSidebarOpen(false)}
          />

          {/* ---- Main Chat Area ---- */}
          <div className="flex-1 flex flex-col min-w-0 bg-[#141414]">

            {/* header */}
            <header className="flex items-center justify-between px-4 py-3 border-b border-[#2a2a2a] bg-[#141414] shrink-0">
              <div className="flex items-center gap-3">
                <button
                  onClick={() => setSidebarOpen(true)}
                  className="md:hidden text-gray-400 hover:text-white text-xl p-1"
                  aria-label="Toggle sidebar"
                >
                  <i className="fas fa-bars"></i>
                </button>
                <h1 className="text-lg font-semibold text-white truncate">
                  {currentConversationId
                    ? getConversationTitle(currentConversationId)
                    : 'AI Chatbox'}
                </h1>
              </div>
              <div className="flex items-center gap-3">
                <StatusIndicator connected={isConnected} />
                <button
                  onClick={handleClearChat}
                  className="text-gray-400 hover:text-white text-sm px-2 py-1 rounded hover:bg-[#2a2a2a] transition"
                  title="Clear chat"
                  disabled={currentMessages.length === 0}
                >
                  <i className="fas fa-eraser"></i>
                </button>
                <button
                  onClick={() => setSettingsOpen(true)}
                  className="text-gray-400 hover:text-white text-lg p-1"
                  aria-label="Settings"
                >
                  <i className="fas fa-sliders-h"></i>
                </button>
              </div>
            </header>

            {/* messages */}
            <MessageList messages={currentMessages} isLoading={isLoading} />

            {/* input */}
            <ChatInput onSend={sendMessage} disabled={isLoading || !isConnected} />

            {/* clear confirm */}
            {showClearConfirm && (
              <div className="absolute inset-0 bg-black/60 flex items-center justify-center z-50">
                <div className="bg-[#1e1e1e] rounded-xl p-6 max-w-sm w-full border border-[#2a2a2a] shadow-2xl">
                  <h3 className="text-lg font-semibold text-white mb-2">Clear chat?</h3>
                  <p className="text-gray-400 text-sm mb-5">This will remove all messages in the current conversation.</p>
                  <div className="flex justify-end gap-3">
                    <button
                      onClick={() => setShowClearConfirm(false)}
                      className="px-4 py-2 rounded-lg text-sm text-gray-300 hover:bg-[#2a2a2a] transition"
                    >
                      Cancel
                    </button>
                    <button
                      onClick={confirmClear}
                      className="px-4 py-2 rounded-lg text-sm bg-red-600 hover:bg-red-700 text-white transition"
                    >
                      Clear
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* ---- Settings Modal ---- */}
          <SettingsModal
            isOpen={settingsOpen}
            onClose={() => setSettingsOpen(false)}
            settings={settings}
            onSave={updateSettings}
            onTest={testConnection}
            isConnected={isConnected}
          />
        </div>
      );
    }
  </script>

  <script type="module">
    // -------------------------------------------------------------
    //  hooks/useChat.ts
    // -------------------------------------------------------------
    import { useState, useEffect, useCallback, useMemo } from 'react';
    import { api } from './utils/api';

    const STORAGE_KEY = 'ai-chatbox-data';
    const SETTINGS_KEY = 'ai-chatbox-settings';

    const DEFAULT_SETTINGS = {
      apiUrl: '',
      model: 'local-model',
      temperature: 0.7,
      maxTokens: 2048,
      systemPrompt: 'You are a helpful assistant.',
    };

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function getDefaultConversation() {
      return {
        id: generateId(),
        title: 'New Chat',
        messages: [],
        createdAt: Date.now(),
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (data.conversations && data.currentId) {
            return data;
          }
        }
      } catch (_) { /* ignore */ }
      const conv = getDefaultConversation();
      return { conversations: [conv], currentId: conv.id };
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (raw) {
          const s = JSON.parse(raw);
          return { ...DEFAULT_SETTINGS, ...s };
        }
      } catch (_) { /* ignore */ }
      return { ...DEFAULT_SETTINGS };
    }

    export function useChat() {
      const [state, setState] = useState(loadState);
      const [settings, setSettings] = useState(loadSettings);
      const [isLoading, setIsLoading] = useState(false);
      const [isConnected, setIsConnected] = useState(false);

      const currentConversation = useMemo(() => {
        return state.conversations.find(c => c.id === state.currentId) || null;
      }, [state]);

      const currentMessages = useMemo(() => {
        return currentConversation?.messages || [];
      }, [currentConversation]);

      // persist state
      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (_) { /* ignore */ }
      }, [state]);

      useEffect(() => {
        try {
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        } catch (_) { /* ignore */ }
      }, [settings]);

      // auto-test connection when settings change
      useEffect(() => {
        if (settings.apiUrl) {
          testConnection().then(ok => setIsConnected(ok));
        } else {
          setIsConnected(false);
        }
      }, [settings.apiUrl]);

      const createNewChat = useCallback(() => {
        const conv = getDefaultConversation();
        setState(prev => ({
          conversations: [conv, ...prev.conversations],
          currentId: conv.id,
        }));
      }, []);

      const deleteConversation = useCallback((id) => {
        setState(prev => {
          const filtered = prev.conversations.filter(c => c.id !== id);
          if (filtered.length === 0) {
            const fresh = getDefaultConversation();
            return { conversations: [fresh], currentId: fresh.id };
          }
          let nextId = prev.currentId;
          if (prev.currentId === id) {
            nextId = filtered[0].id;
          }
          return { conversations: filtered, currentId: nextId };
        });
      }, []);

      const switchConversation = useCallback((id) => {
        setState(prev => {
          if (prev.conversations.some(c => c.id === id)) {
            return { ...prev, currentId: id };
          }
          return prev;
        });
      }, []);

      const updateConversationTitle = useCallback((id, title) => {
        setState(prev => ({
          ...prev,
          conversations: prev.conversations.map(c =>
            c.id === id ? { ...c, title } : c
          ),
        }));
      }, []);

      const getConversationTitle = useCallback((id) => {
        const conv = state.conversations.find(c => c.id === id);
        if (!conv) return 'Chat';
        if (conv.title && conv.title !== 'New Chat') return conv.title;
        const firstMsg = conv.messages.find(m => m.role === 'user');
        if (firstMsg) {
          const snippet = firstMsg.content.slice(0, 40);
          return snippet + (firstMsg.content.length > 40 ? '…' : '');
        }
        return 'New Chat';
      }, [state.conversations]);

      const clearCurrentChat = useCallback(() => {
        setState(prev => {
          const updated = prev.conversations.map(c =>
            c.id === prev.currentId ? { ...c, messages: [] } : c
          );
          return { ...prev, conversations: updated };
        });
      }, []);

      const sendMessage = useCallback(async (content) => {
        if (!content.trim()) return;
        if (!settings.apiUrl) {
          alert('Please configure the API URL in Settings.');
          return;
        }

        const convId = state.currentId;
        // add user message
        setState(prev => {
          const updated = prev.conversations.map(c =>
            c.id === convId
              ? { ...c, messages: [...c.messages, { role: 'user', content: content.trim(), timestamp: Date.now() }] }
              : c
          );
          return { ...prev, conversations: updated };
        });

        setIsLoading(true);

        try {
          // build history (excluding the just-added user message, since we're sending it)
          const conv = state.conversations.find(c => c.id === convId);
          const history = (conv?.messages || []).map(m => ({
            role: m.role,
            content: m.content,
          }));

          const payload = {
            message: content.trim(),
            history,
            settings: {
              model: settings.model,
              temperature: settings.temperature,
              maxTokens: settings.maxTokens,
              systemPrompt: settings.systemPrompt,
            },
          };

          const response = await api.chat(settings.apiUrl, payload);

          // add assistant response
          setState(prev => {
            const updated = prev.conversations.map(c =>
              c.id === convId
                ? { ...c, messages: [...c.messages, { role: 'assistant', content: response, timestamp: Date.now() }] }
                : c
            );
            return { ...prev, conversations: updated };
          });

          // update title if it's the first exchange
          const convAfter = state.conversations.find(c => c.id === convId);
          if (convAfter && convAfter.messages.length === 1) {
            const title = content.trim().slice(0, 40) + (content.trim().length > 40 ? '…' : '');
            updateConversationTitle(convId, title);
          }

        } catch (err) {
          console.error('Send message error:', err);
          const errorMsg = err.message || 'Failed to get response from AI.';
          // show error as assistant message
          setState(prev => {
            const updated = prev.conversations.map(c =>
              c.id === convId
                ? { ...c, messages: [...c.messages, { role: 'assistant', content: `⚠️ ${errorMsg}`, timestamp: Date.now() }] }
                : c
            );
            return { ...prev, conversations: updated };
          });
        } finally {
          setIsLoading(false);
        }
      }, [state, settings, updateConversationTitle]);

      const testConnection = useCallback(async () => {
        if (!settings.apiUrl) return false;
        try {
          const ok = await api.test(settings.apiUrl);
          setIsConnected(ok);
          return ok;
        } catch (_) {
          setIsConnected(false);
          return false;
        }
      }, [settings.apiUrl]);

      const updateSettings = useCallback((newSettings) => {
        setSettings(prev => ({ ...prev, ...newSettings }));
      }, []);

      return {
        conversations: state.conversations,
        currentConversationId: state.currentId,
        currentMessages,
        isLoading,
        isConnected,
        settings,
        createNewChat,
        deleteConversation,
        switchConversation,
        sendMessage,
        clearCurrentChat,
        updateSettings,
        testConnection,
        getConversationTitle,
      };
    }
  </script>

  <script type="module">
    // -------------------------------------------------------------
    //  utils/api.ts
    // -------------------------------------------------------------
    export const api = {
      async chat(baseUrl, payload) {
        const url = baseUrl.replace(/\/+$/, '') + '/api/chat';
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          signal: AbortSignal.timeout(120000), // 2 min timeout
        });
        if (!resp.ok) {
          const text = await resp.text();
          throw new Error(text || `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        if (!data.response) {
          throw new Error('Invalid response from server');
        }
        return data.response;
      },

      async test(baseUrl) {
        try {
          const url = baseUrl.replace(/\/+$/, '') + '/api/health';
          const resp = await fetch(url, { signal: AbortSignal.timeout(5000) });
          return resp.ok;
        } catch (_) {
          return false;
        }
      },
    };
  </script>

  <script type="module">
    // -------------------------------------------------------------
    //  components/Sidebar.tsx
    // -------------------------------------------------------------
    import React from 'react';

    export function Sidebar({
      conversations,
      currentId,
      onNewChat,
      onSwitchChat,
      onDeleteChat,
      onOpenSettings,
      isOpen,
      onClose,
    }) {
      return (
        <>
          <aside
            className={`
              sidebar-transition
              w-72 shrink-0 bg-[#1a1a1a] border-r border-[#2a2a2a] flex flex-col h-full
              ${isOpen ? 'sidebar-mobile open' : 'sidebar-mobile'}
              md:relative md:translate-x-0 md:!w-72
            `}
          >
            {/* header */}
            <div className="flex items-center justify-between p-4 border-b border-[#2a2a2a]">
              <h2 className="text-lg font-bold text-white tracking-tight">Conversations</h2>
              <button
                onClick={onNewChat}
                className="bg-[#2a2a2a] hover:bg-[#3a3a3a] text-white rounded-lg p-2 transition"
                aria-label="New chat"
              >
                <i className="fas fa-plus"></i>
              </button>
            </div>

            {/* list */}
            <div className="flex-1 overflow-y-auto p-2 space-y-1">
              {conversations.length === 0 ? (
                <div className="text-center text-gray-500 text-sm py-8">
                  No conversations yet.
                  <br />
                  Click <i className="fas fa-plus"></i> to start.
                </div>
              ) : (
                conversations.map(conv => {
                  const isActive = conv.id === currentId;
                  const title = conv.title || 'New Chat';
                  const msgCount = conv.messages.length;
                  return (
                    <div
                      key={conv.id}
                      className={`
                        group flex items-center justify-between rounded-lg px-3 py-2.5 cursor-pointer transition
                        ${isActive ? 'bg-[#2a2a2a]' : 'hover:bg-[#222]'}
                      `}
                      onClick={() => onSwitchChat(conv.id)}
                    >
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium text-white truncate">{title}</div>
                        <div className="text-xs text-gray-500">{msgCount} messages</div>
                      </div>
                      <button
                        onClick={(e) => { e.stopPropagation(); onDeleteChat(conv.id); }}
                        className="text-gray-500 hover:text-red-400 transition p-1 opacity-0 group-hover:opacity-100"
                        aria-label="Delete conversation"
                      >
                        <i className="fas fa-trash-alt text-sm"></i>
                      </button>
                    </div>
                  );
                })
              )}
            </div>

            {/* footer */}
            <div className="p-4 border-t border-[#2a2a2a]">
              <button
                onClick={onOpenSettings}
                className="w-full flex items-center justify-center gap-2 text-gray-400 hover:text-white hover:bg-[#2a2a2a] rounded-lg py-2 transition text-sm"
              >
                <i className="fas fa-sliders-h"></i>
                <span>Settings</span>
              </button>
            </div>
          </aside>

          {/* close button for mobile (inside sidebar) */}
          <button
            onClick={onClose}
            className="md:hidden absolute top-3 right-3 z-50 text-gray-400 hover:text-white text-xl p-1"
            aria-label="Close sidebar"
          >
            <i className="fas fa-times"></i>
          </button>
        </>
      );
    }
  </script>

  <script type="module">
    // -------------------------------------------------------------
    //  components/StatusIndicator.tsx
    // -------------------------------------------------------------
    import React from 'react';

    export function StatusIndicator({ connected }) {
      return (
        <div className="flex items-center gap-2 text-xs">
          <span
            className={`
              inline-block w-2.5 h-2.5 rounded-full
              ${connected ? 'bg-green-500' : 'bg-red-500'}
              ${connected ? 'shadow-[0_0_8px_#22c55e]' : 'shadow-[0_0_8px_#ef4444]'}
            `}
          />
          <span className="text-gray-400 hidden sm:inline">
            {connected ? 'Online' : 'Offline'}
          </span>
        </div>
      );
    }
  </script>

  <script type="module">
    // -------------------------------------------------------------
    //  components/MessageList.tsx
    // -------------------------------------------------------------
    import React, { useRef, useEffect } from 'react';
    import { Message } from './Message';

    export function MessageList({ messages, isLoading }) {
      const containerRef = useRef(null);
      const bottomRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }, [messages, isLoading]);

      return (
        <div ref={containerRef} className="flex-1 overflow-y-auto px-4 py-4 space-y-0.5">
          {messages.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-full text-gray-500 select-none">
              <div className="text-5xl mb-4 opacity-20">🤖</div>
              <p className="text-lg font-medium text-gray-400">Start a conversation</p>
              <p className="text-sm text-gray-600 mt-1">Send a message to begin chatting with AI.</p>
            </div>
          ) : (
            messages.map((msg, idx) => (
              <Message key={idx} role={msg.role} content={msg.content} timestamp={msg.timestamp} />
            ))
          )}
          {isLoading && (
            <div className="flex items-start gap-3 px-3 py-3 msg-enter">
              <div className="w-8 h-8 rounded-full bg-[#2a2a2a] flex items-center justify-center shrink-0">
                <span className="text-sm">🤖</span>
              </div>
              <div className="flex items-center gap-1.5 bg-[#1e1e1e] rounded-2xl rounded-tl-none px-4 py-3">
                <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
                <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
                <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>
      );
    }
  </script>

  <script type="module">
    // -------------------------------------------------------------
    //  components/Message.tsx
    // -------------------------------------------------------------
    import React from 'react';

    export function Message({ role, content, timestamp }) {
      const isUser = role === 'user';
      const timeStr = timestamp
        ? new Date(timestamp).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })
        : '';

      return (
        <div className={`flex items-start gap-3 px-3 py-3 msg-enter ${isUser ? 'flex-row-reverse' : ''}`}>
          <div
            className={`
              w-8 h-8 rounded-full flex items-center justify-center shrink-0
              ${isUser ? 'bg-blue-600' : 'bg-[#2a2a2a]'}
            `}
          >
            <span className="text-sm">{isUser ? '👤' : '🤖'}</span>
          </div>
          <div
            className={`
              max-w-[80%] rounded-2xl px-4 py-2.5
              ${isUser ? 'bg-blue-600/90 text-white rounded-tr-none' : 'bg-[#1e1e1e] text-gray-200 rounded-tl-none'}
            `}
          >
            <div className="whitespace-pre-wrap break-words text-sm leading-relaxed">{content}</div>
            <div className={`text-[10px] mt-1 ${isUser ? 'text-blue-200/70' : 'text-gray-500'}`}>
              {timeStr}
            </div>
          </div>
        </div>
      );
    }
  </script>

  <script type="module">
    // -------------------------------------------------------------
    //  components/ChatInput.tsx
    // -------------------------------------------------------------
    import React, { useState, useRef, useEffect } from 'react';

    export function ChatInput({ onSend, disabled }) {
      const [input, setInput] = useState('');
      const textareaRef = useRef(null);

      const handleSubmit = () => {
        const trimmed = input.trim();
        if (!trimmed || disabled) return;
        onSend(trimmed);
        setInput('');
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSubmit();
        }
      };

      const handleChange = (e) => {
        setInput(e.target.value);
        // auto-resize
        const el = e.target;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
      };

      useEffect(() => {
        if (!disabled && textareaRef.current) {
          textareaRef.current.focus();
        }
      }, [disabled]);

      return (
        <div className="border-t border-[#2a2a2a] bg-[#141414] p-4 shrink-0">
          <div className="max-w-4xl mx-auto flex items-end gap-3">
            <div className="flex-1 relative">
              <textarea
                ref={textareaRef}
                value={input}
                onChange={handleChange}
                onKeyDown={handleKeyDown}
                disabled={disabled}
                placeholder={disabled ? 'Connecting…' : 'Type a message…'}
                rows={1}
                className={`
                  w-full resize-none rounded-2xl bg-[#1e1e1e] text-white placeholder-gray-500
                  px-4 py-3 pr-12 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600/60
                  transition border border-[#2a2a2a] focus:border-blue-600
                  ${disabled ? 'opacity-50 cursor-not-allowed' : ''}
                `}
                style={{ minHeight: '52px', maxHeight: '160px' }}
              />
            </div>
            <button
              onClick={handleSubmit}
              disabled={!input.trim() || disabled}
              className={`
                shrink-0 rounded-full p-3 transition
                ${input.trim() && !disabled
                  ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-lg shadow-blue-600/30'
                  : 'bg-[#2a2a2a] text-gray-500 cursor-not-allowed'
                }
              `}
              aria-label="Send message"
            >
              <i className="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      );
    }
  </script>

  <script type="module">
    // -------------------------------------------------------------
    //  components/SettingsModal.tsx
    // -------------------------------------------------------------
    import React, { useState, useEffect } from 'react';

    export function SettingsModal({ isOpen, onClose, settings, onSave, onTest, isConnected }) {
      const [form, setForm] = useState(settings);
      const [testing, setTesting] = useState(false);
      const [testResult, setTestResult] = useState(null); // true/false

      useEffect(() => {
        if (isOpen) {
          setForm(settings);
          setTestResult(null);
        }
      }, [isOpen, settings]);

      const handleChange = (e) => {
        const { name, value, type } = e.target;
        setForm(prev => ({
          ...prev,
          [name]: type === 'number' ? parseFloat(value) : value,
        }));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        onSave(form);
        onClose();
      };

      const handleTest = async () => {
        if (!form.apiUrl) return;
        setTesting(true);
        setTestResult(null);
        try {
          const ok = await onTest();
          setTestResult(ok);
        } catch (_) {
          setTestResult(false);
        } finally {
          setTesting(false);
        }
      };

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
          <div className="bg-[#1a1a1a] rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto border border-[#2a2a2a] shadow-2xl">
            <div className="flex items-center justify-between p-5 border-b border-[#2a2a2a]">
              <h2 className="text-xl font-bold text-white">Settings</h2>
              <button
                onClick={onClose}
                className="text-gray-400 hover:text-white text-xl p-1"
                aria-label="Close settings"
              >
                <i className="fas fa-times"></i>
              </button>
            </div>

            <form onSubmit={handleSubmit} className="p-5 space-y-5">
              {/* API URL */}
              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">
                  API URL <span className="text-red-400">*</span>
                </label>
                <input
                  type="url"
                  name="apiUrl"
                  value={form.apiUrl || ''}
                  onChange={handleChange}
                  placeholder="https://your-ngrok-url.ngrok.io"
                  className="w-full bg-[#0d0d0d] border border-[#2a2a2a] rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-600/60 focus:border-blue-600 transition"
                  required
                />
                <p className="text-xs text-gray-500 mt-1.5">
                  Your ngrok public URL (e.g. https://abc123.ngrok.io)
                </p>
              </div>

              {/* Test button */}
              <div className="flex items-center gap-3">
                <button
                  type="button"
                  onClick={handleTest}
                  disabled={testing || !form.apiUrl}
                  className="px-4 py-2 bg-[#2a2a2a] hover:bg-[#3a3a3a] text-white rounded-lg text-sm transition disabled:opacity-50"
                >
                  {testing ? 'Testing…' : 'Test Connection'}
                </button>
                {testResult !== null && (
                  <span className={`text-sm ${testResult ? 'text-green-400' : 'text-red-400'}`}>
                    {testResult ? '✅ Connected' : '❌ Failed'}
                  </span>
                )}
                {isConnected && (
                  <span className="text-xs text-green-400/70 ml-auto">● Online</span>
                )}
              </div>

              <hr className="border-[#2a2a2a]" />

              {/* Model */}
              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">Model Name</label>
                <input
                  type="text"
                  name="model"
                  value={form.model || ''}
                  onChange={handleChange}
                  placeholder="local-model"
                  className="w-full bg-[#0d0d0d] border border-[#2a2a2a] rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-600/60 focus:border-blue-600 transition"
                />
              </div>

              {/* Temperature */}
              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">
                  Temperature: <span className="text-blue-400">{form.temperature ?? 0.7}</span>
                </label>
                <input
                  type="range"
                  name="temperature"
                  min="0"
                  max="2"
                  step="0.05"
                  value={form.temperature ?? 0.7}
                  onChange={handleChange}
                  className="w-full accent-blue-600 bg-[#2a2a2a] rounded-lg h-1.5"
                />
                <div className="flex justify-between text-xs text-gray-500">
                  <span>Precise</span>
                  <span>Creative</span>
                </div>
              </div>

              {/* Max Tokens */}
              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">
                  Max Tokens: <span className="text-blue-400">{form.maxTokens ?? 2048}</span>
                </label>
                <input
                  type="range"
                  name="maxTokens"
                  min="256"
                  max="8192"
                  step="128"
                  value={form.maxTokens ?? 2048}
                  onChange={handleChange}
                  className="w-full accent-blue-600 bg-[#2a2a2a] rounded-lg h-1.5"
                />
              </div>

              {/* System Prompt */}
              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">System Prompt</label>
                <textarea
                  name="systemPrompt"
                  value={form.systemPrompt || ''}
                  onChange={handleChange}
                  rows="3"
                  placeholder="You are a helpful assistant."
                  className="w-full bg-[#0d0d0d] border border-[#2a2a2a] rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-600/60 focus:border-blue-600 transition resize-none"
                />
              </div>

              {/* Actions */}
              <div className="flex justify-end gap-3 pt-2 border-t border-[#2a2a2a]">
                <button
                  type="button"
                  onClick={onClose}
                  className="px-5 py-2.5 text-sm text-gray-300 hover:text-white hover:bg-[#2a2a2a] rounded-lg transition"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition shadow-lg shadow-blue-600/30"
                >
                  Save Settings
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }
  </script>
</body>
</html>
