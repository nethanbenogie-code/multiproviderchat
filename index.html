<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Provider Chat</title>
    
    <!-- PWA Meta Tags & Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a84ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #f5f5f5;
            --card-bg: #fff;
            --user-bubble: #007bff;
            --assistant-bubble: #e9ecef;
            --text: #333;
            --input-bg: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        header { background: var(--card-bg); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; box-shadow: var(--shadow); }
        header h1 { font-size: 20px; color: var(--text); }
        .header-actions button { background: none; border: none; font-size: 18px; cursor: pointer; color: #555; padding: 5px 10px; border-radius: 5px; transition: 0.2s; }
        .header-actions button:hover { background: #eee; }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; position: relative; word-wrap: break-word; }
        .message.user { align-self: flex-end; background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .message.assistant { align-self: flex-start; background: var(--assistant-bubble); color: var(--text); border-bottom-left-radius: 4px; }
        .message.system { align-self: center; background: #f8d7da; color: #721c24; border-radius: 8px; font-size: 14px; max-width: 90%; text-align: center; }

        /* Thinking Dots */
        .thinking-indicator { align-self: flex-start; background: var(--assistant-bubble); padding: 12px 16px; border-radius: 18px; border-bottom-left-radius: 4px; display: none; margin-bottom: 10px; }
        .dot { display: inline-block; width: 8px; height: 8px; background: #888; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Input Area */
        .input-area { background: var(--card-bg); padding: 15px 20px; display: flex; gap: 12px; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 16px; background: var(--input-bg); }
        .input-area input:focus { border-color: var(--user-bubble); }
        .input-area button { padding: 0 25px; background: var(--user-bubble); color: white; border: none; border-radius: 25px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .input-area button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal h2 { margin-bottom: 20px; }
        .modal label { display: block; margin: 10px 0 5px; font-weight: 600; font-size: 14px; }
        .modal select, .modal input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        .modal .btn-group { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
        .modal .btn-primary { background: var(--user-bubble); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .modal .btn-secondary { background: #eee; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }

        @media (prefers-color-scheme: dark) {
            :root { --bg: #1a1a1a; --card-bg: #2c2c2c; --user-bubble: #0a84ff; --assistant-bubble: #3a3a3a; --text: #f0f0f0; --input-bg: #3a3a3a; --shadow: 0 4px 12px rgba(0,0,0,0.5); }
            .modal { background: #2c2c2c; color: white; }
            .modal input, .modal select { background: #3a3a3a; color: white; border-color: #555; }
            .message.system { background: #4a1a1a; color: #ffb3b3; }
        }
    </style>
</head>
<body>

    <header>
        <h1>💬 Local LLM Chat</h1>
        <div class="header-actions">
            <span id="status-badge" style="font-size:14px; margin-right:15px; color:#666;">Provider: ollama</span>
            <button onclick="openSettings()">⚙️ Settings</button>
        </div>
    </header>

    <div id="chat-container">
        <!-- Chat messages will be injected here -->
        <div class="message system">System ready. Type a message to start.</div>
    </div>

    <!-- Thinking Dots -->
    <div class="thinking-indicator" id="thinking-indicator">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2>Settings</h2>
            <label>Provider</label>
            <select id="provider-select" onchange="updateFields()">
                <option value="ollama">Ollama</option>
                <option value="gemma" selected>Gemma (LM Studio)</option>
                <option value="anthropic">Anthropic</option>
            </select>

            <div id="dynamic-fields">
                <label>Base URL</label>
                <input type="text" id="base-url" placeholder="http://127.0.0.1:1234/v1" value="http://127.0.0.1:1234/v1">
                <label>Model Name</label>
                <input type="text" id="model-name" placeholder="google/gemma-4-e4b" value="google/gemma-4-e4b">
            </div>

            <div class="btn-group">
                <button class="btn-secondary" onclick="testConnection()">Test Connection</button>
                <button class="btn-primary" onclick="saveSettings()">Save & Close</button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let config = {
            provider: "gemma",
            base_url: "http://127.0.0.1:1234/v1",
            model: "google/gemma-4-e4b",
            anthropic_key: "",
            ngrok_url: null
        };
        let messages = [];
        let isProcessing = false;

        // Load from localStorage
        function loadConfig() {
            const saved = localStorage.getItem('chatConfig');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    config = { ...config, ...parsed };
                } catch(e) {}
            }
            updateUI();
        }

        function saveConfig() {
            localStorage.setItem('chatConfig', JSON.stringify(config));
            updateUI();
        }

        function updateUI() {
            document.getElementById('status-badge').innerText = `Provider: ${config.provider}`;
            document.getElementById('provider-select').value = config.provider;
            if (config.provider === 'anthropic') {
                document.getElementById('base-url').value = 'https://api.anthropic.com/v1';
                document.getElementById('model-name').value = 'claude-3-5-sonnet-20240620';
            } else if (config.ngrok_url) {
                document.getElementById('base-url').value = config.ngrok_url;
                document.getElementById('model-name').value = config.model;
            } else {
                document.getElementById('base-url').value = config.base_url;
                document.getElementById('model-name').value = config.model;
            }
        }

        // Chat Functions
        function addMessage(role, content) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            if (role === 'user' || role === 'assistant') {
                messages.push({ role: role, content: content });
            }
        }

        async function sendMessage() {
            if (isProcessing) return;
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';

            document.getElementById('thinking-indicator').style.display = 'block';
            document.getElementById('send-btn').disabled = true;
            isProcessing = true;

            try {
                let msgs = messages.filter(m => m.role !== 'system');
                let responseText = "";

                if (config.provider === 'anthropic') {
                    const body = {
                        model: config.model,
                        max_tokens: 1024,
                        messages: msgs
                    };
                    const sysMsg = messages.find(m => m.role === 'system');
                    if (sysMsg) body.system = sysMsg.content;

                    const resp = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': config.anthropic_key,
                            'anthropic-version': '2023-06-01'
                        },
                        body: JSON.stringify(body)
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.error?.message || 'Anthropic API Error');
                    responseText = data.content[0].text;

                } else {
                    const proxyUrl = 'https://corsproxy.io/?';
                    const targetUrl = `${config.base_url}/chat/completions`;
                    
                    const resp = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: config.model,
                            messages: msgs,
                            stream: false
                        })
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.error?.message || 'API Error');
                    if (!data.choices || data.choices.length === 0) {
                        throw new Error('Received an empty response from the model.');
                    }
                    responseText = data.choices[0].message.content;
                }

                addMessage('assistant', responseText);

            } catch (error) {
                addMessage('system', `Error: ${error.message}`);
            } finally {
                document.getElementById('thinking-indicator').style.display = 'none';
                document.getElementById('send-btn').disabled = false;
                isProcessing = false;
            }
        }

        // Settings Modal Logic
        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
            updateFields();
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function updateFields() {
            const provider = document.getElementById('provider-select').value;
            const dynamicDiv = document.getElementById('dynamic-fields');
            
            if (provider === 'anthropic') {
                dynamicDiv.innerHTML = `
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="sk-ant-..." value="${config.anthropic_key}">
                    <label>Model Name</label>
                    <input type="text" id="model-name" value="claude-3-5-sonnet-20240620">
                `;
            } else {
                const url = provider === 'gemma' ? 'http://127.0.0.1:1234/v1' : 'http://localhost:11434/v1';
                const initialBaseUrl = config.ngrok_url || (config.base_url || url);

                dynamicDiv.innerHTML = `
                    <label>Base URL</label>
                    <input type="text" id="base-url" value="${initialBaseUrl}">
                    <label>Model Name</label>
                    <input type="text" id="model-name" value="${config.model || 'google/gemma-4-e4b'}">
                `;
            }
        }

        function saveSettings() {
            const provider = document.getElementById('provider-select').value;
            config.provider = provider;

            if (provider === 'anthropic') {
                config.anthropic_key = document.getElementById('api-key').value;
                config.model = document.getElementById('model-name').value;
                config.base_url = 'https://api.anthropic.com/v1';
                config.ngrok_url = null;
            } else {
                const enteredUrl = document.getElementById('base-url').value.trim();
                if (enteredUrl && enteredUrl.includes("ngrok-free.dev")) {
                    config.ngrok_url = enteredUrl;
                    config.base_url = enteredUrl;
                } else if (enteredUrl) {
                    config.base_url = enteredUrl;
                    config.ngrok_url = null;
                }
                config.model = document.getElementById('model-name').value;
            }
            saveConfig();
            closeSettings();
        }

        async function testConnection() {
            const btn = document.querySelector('.btn-secondary');
            const originalText = btn.innerText;
            btn.innerText = 'Testing...';
            btn.disabled = true;
            const proxyUrl = 'https://corsproxy.io/?';

            try {
                const provider = document.getElementById('provider-select').value;
                if (provider === 'anthropic') {
                    const key = document.getElementById('api-key').value;
                    if (!key) throw new Error("API Key required for Anthropic");
                    alert("✅ Anthropic API key seems valid.");
                } else {
                    const url = document.getElementById('base-url').value;
                    const resp = await fetch(proxyUrl + encodeURIComponent(`${url}/models`));
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    alert(`✅ Connected successfully! Found ${data.data.length} model(s).`);
                }
            } catch (err) {
                alert(`❌ Connection failed: ${err.message}`);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Initialize
        loadConfig();
        document.getElementById('settings-modal').addEventListener('click', function(e) {
            if (e.target === this) closeSettings();
        });

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('PWA Service Worker registered successfully!'))
                .catch((err) => console.log('PWA registration failed:', err));
            });
        }
    </script>
</body>
</html>
